<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Trading Dashboard PRO</title>
</head>

<body class="bg-gradient-to-br from-[#0b111e] via-[#0f172a] to-[#020617] text-white font-sans">

<div class="grid grid-cols-12 grid-rows-[60px_1fr] h-screen bg-[#0b111e]">

  <!-- 🔝 TOP BAR -->
  <div class="col-span-12 flex items-center justify-between px-6 border-b border-slate-800 bg-[#0f172a]">

    <div class="flex items-center gap-6 text-sm text-slate-400">
      <span class="text-white font-bold">Mi portafolio</span>
      <span>Mercados</span>
      <span>Cripto</span>
    </div>

    <input 
      placeholder="Buscar cotizaciones..." 
      class="bg-[#020617] border border-slate-700 px-3 py-1 rounded-lg w-64 text-sm outline-none focus:border-blue-500"
    />

  </div>

  <!-- 📋 LEFT -->
  <div class="col-span-2 p-3 border-r border-slate-800 overflow-y-auto bg-[#111827]">
    <h2 class="text-xs uppercase text-slate-400 mb-3 tracking-widest">Watchlist</h2>
    <div id="watchlist"></div>
  </div>

  <!-- 📊 CENTER -->
  <div class="col-span-7 p-4 space-y-4 overflow-y-auto">

    <!-- Header activo -->
    <div class="bg-[#111827] p-4 rounded-xl border border-slate-800">
      <h2 id="asset-title" class="text-xl font-bold">BTCUSDT</h2>
      <p id="asset-change" class="text-green-400 text-sm">Cargando...</p>
    </div>

    <!-- Chart -->
    <div class="bg-black rounded-xl overflow-hidden border border-slate-800">
      <div id="tv-chart" class="h-[450px]"></div>
    </div>

    <!-- Noticias (placeholder) -->
    <div class="bg-[#111827] p-4 rounded-xl border border-slate-800 text-sm text-slate-400">
      Noticias y análisis próximamente...
    </div>

  </div>

  <!-- 📈 RIGHT -->
  <div class="col-span-3 p-4 space-y-4 border-l border-slate-800 bg-[#111827]">

    <div class="bg-[#020617] p-4 rounded-xl">
      <h3 class="text-xs text-slate-400 uppercase">Estado mercado</h3>
      <p id="taco-status" class="text-yellow-400 font-bold">Cargando...</p>
      <div class="w-full bg-black h-2 mt-2 rounded">
        <div id="taco-bar" class="h-2 bg-yellow-500 rounded"></div>
      </div>
    </div>

    <div class="bg-[#020617] p-4 rounded-xl">
      <h3 class="text-xs text-slate-400 uppercase mb-2">Heatmap</h3>
      <div id="heatmap"></div>
    </div>

  </div>

</div>
<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
/* =========================
   📊 TRADINGVIEW
========================= */
window.tvWidget = new TradingView.widget({
  "container_id": "tv-chart",
  "width": "100%",
  "height": "100%",
  "symbol": "BINANCE:BTCUSDT",
  "interval": "15",
  "theme": "dark",
  "style": "1",
  "locale": "es",
  "toolbar_bg": "#0b111e",
  "enable_publishing": false,
  "allow_symbol_change": true,
  "studies": [
    "RSI@tv-basicstudies",
    "MACD@tv-basicstudies"
  ]
});

/* =========================
   🧠 STATE
========================= */
const state = { market: {} };

/* =========================
   🔌 WEBSOCKET
========================= */
const socket = new WebSocket(
  "wss://stream.binance.com:9443/stream?streams=btcusdt@ticker/ethusdt@ticker/solusdt@ticker"
);

socket.onmessage = (event) => {
  const data = JSON.parse(event.data).data;

  state.market[data.s] = {
    symbol: data.s,
    price: parseFloat(data.c),
    change: parseFloat(data.P)
  };

  renderWatchlist();
};

socket.onclose = () => setTimeout(() => location.reload(), 2000);

/* =========================
   📋 WATCHLIST
========================= */
function renderWatchlist() {
  const container = document.getElementById("watchlist");
  container.innerHTML = "";

  Object.values(state.market).forEach(asset => {
    const el = document.createElement("div");

    el.className = `
      flex flex-col p-3 mb-2 
      bg-[#020617] rounded-lg 
      hover:bg-blue-500/10 
      cursor-pointer transition-all
    `;

    el.innerHTML = `
      <div class="flex justify-between">
        <span class="font-bold text-white">${asset.symbol}</span>
        <span class="${asset.change >= 0 ? 'text-green-400' : 'text-red-400'}">
          ${asset.change.toFixed(2)}%
        </span>
      </div>
      <div class="text-xs text-slate-400">$${asset.price.toFixed(2)}</div>
    `;

    el.onclick = () => {
      window.tvWidget.setSymbol(`BINANCE:${asset.symbol}`, "15");

      document.getElementById("asset-title").innerText = asset.symbol;
      document.getElementById("asset-change").innerText = `${asset.change.toFixed(2)}%`;
      document.getElementById("asset-change").className =
        asset.change >= 0 ? "text-green-400 text-sm" : "text-red-400 text-sm";
    };

    container.appendChild(el);
  });
}

/* =========================
   🌮 TACO
========================= */
function updateTaco() {
  const risk = Math.floor(Math.random() * 100);
  const bar = document.getElementById("taco-bar");
  const text = document.getElementById("taco-status");

  bar.style.width = risk + "%";

  if (risk > 70) {
    bar.className = "h-2 bg-red-500 rounded";
    text.innerText = "ALERTA ALTA";
    text.className = "text-red-500";
  } else {
    bar.className = "h-2 bg-yellow-500 rounded";
    text.innerText = "ESTABLE";
    text.className = "text-yellow-400";
  }
}
setInterval(updateTaco, 3000);

/* =========================
   🔥 HEATMAP
========================= */
function renderHeatmap() {
  const container = document.getElementById("heatmap");
  container.innerHTML = "";

  for (let i = 0; i < 6; i++) {
    const val = Math.random();

    const box = document.createElement("div");
    box.className = "p-2 mb-2 text-xs rounded " +
      (val > 0.7 ? "bg-red-600" :
       val > 0.4 ? "bg-orange-500" :
                   "bg-yellow-500");

    box.innerText = "Sector " + (i + 1);

    container.appendChild(box);
  }
}
setInterval(renderHeatmap, 5000);
renderHeatmap();
</script>

</body>
</html>
