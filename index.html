<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Trading Dashboard PRO</title>
</head>

<body class="bg-[#0b111e] text-white font-sans">

<div class="grid grid-cols-12 gap-4 h-screen p-4">

  <!-- LEFT: WATCHLIST -->
  <div class="col-span-2 bg-[#151e2d] rounded-xl p-3 overflow-y-auto">
    <h2 class="text-xs uppercase text-slate-400 mb-3">Watchlist</h2>
    <div id="watchlist"></div>
  </div>

  <!-- CENTER: CHART -->
  <div class="col-span-7 bg-black rounded-xl overflow-hidden">
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15&theme=dark"
      class="w-full h-full"
      loading="lazy">
    </iframe>
  </div>

  <!-- RIGHT PANEL -->
  <div class="col-span-3 flex flex-col gap-4">

    <!-- TACO ENGINE -->
    <div class="bg-[#151e2d] rounded-xl p-4">
      <h2 class="text-xs uppercase text-slate-400 mb-3">Taco Engine</h2>
      <div id="taco-status" class="text-sm text-yellow-400">Cargando...</div>
      <div class="w-full bg-black h-2 mt-3 rounded">
        <div id="taco-bar" class="h-2 bg-yellow-500 rounded" style="width:40%"></div>
      </div>
    </div>

    <!-- HEATMAP -->
    <div class="bg-[#151e2d] rounded-xl p-4 flex-1">
      <h2 class="text-xs uppercase text-slate-400 mb-3">Heatmap</h2>
      <div id="heatmap"></div>
    </div>

  </div>
</div>

<script>
/* =========================
   🧠 STATE GLOBAL
========================= */
const state = {
  market: {},
  listeners: []
};

function setState(update) {
  Object.assign(state.market, update);
  state.listeners.forEach(fn => fn(state));
}

function subscribe(fn) {
  state.listeners.push(fn);
}

/* =========================
   🔌 WEBSOCKET BINANCE
========================= */
function connectWS() {
  const socket = new WebSocket(
    "wss://stream.binance.com:9443/stream?streams=btcusdt@ticker/ethusdt@ticker/solusdt@ticker"
  );

  socket.onmessage = (event) => {
    const data = JSON.parse(event.data).data;

    setState({
      [data.s]: {
        symbol: data.s,
        price: parseFloat(data.c),
        change: parseFloat(data.P)
      }
    });
  };

  socket.onclose = () => {
    console.log("Reconectando WS...");
    setTimeout(connectWS, 2000);
  };
}

connectWS();

/* =========================
   🧩 COMPONENTES
========================= */

function renderWatchlist() {
  const container = document.getElementById("watchlist");
  container.innerHTML = "";

  Object.values(state.market).forEach(asset => {
    const el = document.createElement("div");

    el.className = "flex justify-between p-2 border-b border-slate-800 text-sm";

    el.innerHTML = `
      <span>${asset.symbol}</span>
      <span>$${asset.price.toFixed(2)}</span>
      <span class="${asset.change >= 0 ? 'text-green-500' : 'text-red-500'}">
        ${asset.change.toFixed(2)}%
      </span>
    `;

    container.appendChild(el);
  });
}

/* =========================
   🔄 SUBSCRIBE RENDER
========================= */
subscribe(() => {
  renderWatchlist();
});

/* =========================
   🌮 TACO ENGINE (SIMULADO)
========================= */
function updateTaco() {
  const risk = Math.floor(Math.random() * 100);
  const bar = document.getElementById("taco-bar");
  const text = document.getElementById("taco-status");

  bar.style.width = risk + "%";

  if (risk > 70) {
    bar.className = "h-2 bg-red-500 rounded";
    text.innerText = "ALERTA ALTA";
    text.className = "text-red-500";
  } else {
    bar.className = "h-2 bg-yellow-500 rounded";
    text.innerText = "ESTABLE";
    text.className = "text-yellow-400";
  }
}

setInterval(updateTaco, 3000);

/* =========================
   🔥 HEATMAP (SIMULADO)
========================= */
function renderHeatmap() {
  const container = document.getElementById("heatmap");
  container.innerHTML = "";

  for (let i = 0; i < 6; i++) {
    const val = Math.random();

    const box = document.createElement("div");
    box.className = "p-2 mb-2 text-xs rounded " +
      (val > 0.7 ? "bg-red-600" :
       val > 0.4 ? "bg-orange-500" :
                   "bg-yellow-500");

    box.innerText = "Sector " + (i + 1);

    container.appendChild(box);
  }
}

setInterval(renderHeatmap, 5000);
renderHeatmap();

</script>
<script type="module" src="./main.js"></script>
</body>
</html>
